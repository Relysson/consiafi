name: CONSIAFI Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * 1-5"
    - cron: "52 11 * * 1-5"
    - cron: "44 12 * * 1-5"
    - cron: "36 13 * * 1-5"
    - cron: "28 14 * * 1-5"
    - cron: "20 15 * * 1-5"
    - cron: "12 16 * * 1-5"
    - cron: "4 17 * * 1-5"
    - cron: "56 17 * * 1-5"
    - cron: "48 18 * * 1-5"
    - cron: "40 19 * * 1-5"

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Ensure state directory
        run: mkdir -p .github/state

      - name: Run monitor
        env:
          CONSIAFI_LOGIN_URL: ${{ secrets.CONSIAFI_LOGIN_URL }}
          CONSIAFI_APPROVAL_URL: ${{ secrets.CONSIAFI_APPROVAL_URL }}
          CONSIAFI_CPF: ${{ secrets.CONSIAFI_CPF }}
          CONSIAFI_PASSWORD: ${{ secrets.CONSIAFI_PASSWORD }}
          HEADLESS: "true"
          TIMEOUT_MS: "45000"
          STATE_FILE: ".github/state/monitor-state.json"
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node monitor.js

      - name: Commit state if changed
        run: |
          if git diff --quiet -- .github/state/monitor-state.json; then
            echo "Sem alteracao no estado."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/monitor-state.json
          git commit -m "chore: update consiafi monitor state"
          git push
